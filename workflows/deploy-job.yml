name: Deploy Databricks Job Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'workflows/workflow_LISTO_PARA_USAR.yml'
      - '.github/workflows/deploy-job.yml'

jobs:
  deploy_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install jq & curl
        run: sudo apt-get update && sudo apt-get install -y jq curl

      # ─────────────────────────────────────────────
      # PASO 1: Verificar si el Job ya existe
      # Si existe → lo eliminamos para recrearlo limpio
      # Si no existe → lo creamos desde cero
      # ─────────────────────────────────────────────
      - name: Check if Job exists and delete if necessary
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          JOB_NAME="MEDALLION_PIPELINE_ADVENTUREWORKS"

          echo "🔍 Verificando si el Job existe: $JOB_NAME"

          jobs_response=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.1/jobs/list")

          existing_job_id=$(echo "$jobs_response" | jq -r \
            --arg name "$JOB_NAME" \
            '.jobs[]? | select(.settings.name == $name) | .job_id')

          if [ "$existing_job_id" != "" ] && [ "$existing_job_id" != "null" ]; then
            echo "⚠️  Job encontrado con ID: $existing_job_id — eliminando para recrear..."
            curl -s -X POST \
              -H "Authorization: Bearer $DEST_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"job_id\": $existing_job_id}" \
              "$DEST_HOST/api/2.1/jobs/delete"
            echo "🗑️  Job eliminado correctamente"
          else
            echo "ℹ️  No existe Job previo — se creará desde cero"
          fi

      # ─────────────────────────────────────────────
      # PASO 2: Obtener el Cluster ID del ambiente productivo
      # Busca por nombre: cluster_SD
      # ─────────────────────────────────────────────
      - name: Get Cluster ID
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          CLUSTER_NAME="cluster_SD"

          echo "🖥️  Buscando cluster: $CLUSTER_NAME"

          clusters_response=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.0/clusters/list")

          cluster_id=$(echo "$clusters_response" | jq -r \
            --arg name "$CLUSTER_NAME" \
            '.clusters[]? | select(.cluster_name == $name) | .cluster_id')

          if [ "$cluster_id" != "" ] && [ "$cluster_id" != "null" ]; then
            echo "✅ Cluster encontrado: $CLUSTER_NAME (ID: $cluster_id)"
            echo "CLUSTER_ID=$cluster_id" >> $GITHUB_ENV
          else
            echo "❌ Cluster no encontrado: $CLUSTER_NAME"
            echo "Clusters disponibles:"
            echo "$clusters_response" | jq -r '.clusters[]? | .cluster_name'
            exit 1
          fi

      # ─────────────────────────────────────────────
      # PASO 3: Crear el Job con las 8 tareas del pipeline
      # Orden: 1→2→(3,4,5,6 en paralelo)→7→8
      # ─────────────────────────────────────────────
      - name: Create Medallion Pipeline Job
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          CLUSTER_ID="0714-031111-tj25eups"
          NOTEBOOK_BASE="/Workspace/AdventureWorks"

          echo "🚀 Creando Job: MEDALLION_PIPELINE_ADVENTUREWORKS"
          echo "🖥️  Cluster ID: $CLUSTER_ID"

          cat > job_config.json << 'JSONEOF'
          {
            "name": "MEDALLION_PIPELINE_ADVENTUREWORKS",
            "description": "Pipeline Medallion completo: Bronze → Silver → Gold con 8 notebooks en orden secuencial y paralelo",
            "format": "MULTI_TASK",
            "tasks": [
              {
                "task_key": "tarea_1_creacion_usuarios",
                "description": "Crear usuarios y configuración inicial",
                "notebook_task": {
                  "notebook_path": "/Workspace/AdventureWorks/1. Creación de Usuarios",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "0714-031111-tj25eups",
                "timeout_seconds": 3600,
                "max_retries": 1
              },
              {
                "task_key": "tarea_2_preparacion_ambiente",
                "description": "Preparar ambiente y configurar widgets",
                "notebook_task": {
                  "notebook_path": "/Workspace/AdventureWorks/2. Preparacion_Ambiente",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "0714-031111-tj25eups",
                "timeout_seconds": 3600,
                "max_retries": 1,
                "depends_on": [{"task_key": "tarea_1_creacion_usuarios"}]
              },
              {
                "task_key": "tarea_3_customer_bronze",
                "description": "Ingestar Customer.csv a Bronze",
                "notebook_task": {
                  "notebook_path": "/Workspace/AdventureWorks/3. CustomerBronze",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "0714-031111-tj25eups",
                "timeout_seconds": 3600,
                "max_retries": 1,
                "depends_on": [{"task_key": "tarea_2_preparacion_ambiente"}]
              },
              {
                "task_key": "tarea_4_product_bronze",
                "description": "Ingestar Product.csv a Bronze",
                "notebook_task": {
                  "notebook_path": "/Workspace/AdventureWorks/4. ProductBronze",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "0714-031111-tj25eups",
                "timeout_seconds": 3600,
                "max_retries": 1,
                "depends_on": [{"task_key": "tarea_2_preparacion_ambiente"}]
              },
              {
                "task_key": "tarea_5_salesorderdetail_bronze",
                "description": "Ingestar SalesOrderDetail.csv a Bronze",
                "notebook_task": {
                  "notebook_path": "/Workspace/AdventureWorks/5. SalesOrderDetailBronze",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "0714-031111-tj25eups",
                "timeout_seconds": 3600,
                "max_retries": 1,
                "depends_on": [{"task_key": "tarea_2_preparacion_ambiente"}]
              },
              {
                "task_key": "tarea_6_salesorderheader_bronze",
                "description": "Ingestar SalesOrderHeader.csv a Bronze",
                "notebook_task": {
                  "notebook_path": "/Workspace/AdventureWorks/6. SalesOrderHeaderBronze",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "0714-031111-tj25eups",
                "timeout_seconds": 3600,
                "max_retries": 1,
                "depends_on": [{"task_key": "tarea_2_preparacion_ambiente"}]
              },
              {
                "task_key": "tarea_7_silver",
                "description": "Aplicar reglas de calidad y cargar Silver con MERGE",
                "notebook_task": {
                  "notebook_path": "/Workspace/AdventureWorks/7. Silver",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "0714-031111-tj25eups",
                "timeout_seconds": 3600,
                "max_retries": 1,
                "depends_on": [
                  {"task_key": "tarea_3_customer_bronze"},
                  {"task_key": "tarea_4_product_bronze"},
                  {"task_key": "tarea_5_salesorderdetail_bronze"},
                  {"task_key": "tarea_6_salesorderheader_bronze"}
                ]
              },
              {
                "task_key": "tarea_8_golden",
                "description": "Crear star schema en Gold: DimCustomer, DimProduct, FactSales",
                "notebook_task": {
                  "notebook_path": "/Workspace/AdventureWorks/8. Golden",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "0714-031111-tj25eups",
                "timeout_seconds": 3600,
                "max_retries": 1,
                "depends_on": [{"task_key": "tarea_7_silver"}]
              }
            ],
            "schedule": {
              "quartz_cron_expression": "0 0 2 * * ?",
              "timezone_id": "America/Mexico_City",
              "pause_status": "PAUSED"
            },
            "email_notifications": {
              "on_failure": [],
              "on_success": [],
              "no_alert_for_skipped_runs": false
            },
            "timeout_seconds": 28800,
            "max_concurrent_runs": 1,
            "tags": {
              "environment": "production",
              "project": "medallion_adventureworks",
              "created_by": "github_actions",
              "pipeline": "bronze_silver_gold"
            }
          }
          JSONEOF

          create_response=$(curl -s -X POST \
            -H "Authorization: Bearer $DEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d @job_config.json \
            "$DEST_HOST/api/2.1/jobs/create")

          echo "Response: $create_response"

          job_id=$(echo "$create_response" | jq -r '.job_id')

          if [ "$job_id" != "" ] && [ "$job_id" != "null" ]; then
            echo "✅ Job creado exitosamente con ID: $job_id"
            echo "JOB_ID=$job_id" >> $GITHUB_ENV
          else
            echo "❌ Error al crear el Job"
            echo "Response: $create_response"
            exit 1
          fi

      # ─────────────────────────────────────────────
      # PASO 4: Validar que el Job quedó bien configurado
      # ─────────────────────────────────────────────
      - name: Validate Job Configuration
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          JOB_ID="${{ env.JOB_ID }}"

          echo "🔍 Validando Job ID: $JOB_ID"

          job_details=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.1/jobs/get?job_id=$JOB_ID")

          echo ""
          echo "📋 Resumen del Job creado:"
          echo "   Nombre:   $(echo "$job_details" | jq -r '.settings.name')"
          echo "   Tareas:   $(echo "$job_details" | jq '.settings.tasks | length')"
          echo "   Schedule: $(echo "$job_details" | jq -r '.settings.schedule.quartz_cron_expression')"
          echo "   Timezone: $(echo "$job_details" | jq -r '.settings.schedule.timezone_id')"
          echo ""
          echo "📝 Orden de ejecución:"
          echo "$job_details" | jq -r '.settings.tasks[] | 
            "   → " + .task_key + 
            " | notebook: " + .notebook_task.notebook_path'

      # ─────────────────────────────────────────────
      # PASO 5: Cleanup y resumen final
      # ─────────────────────────────────────────────
      - name: Cleanup
        run: rm -f job_config.json

      - name: Summary
        run: |
          echo "========================================"
          echo "🎉 DEPLOY DE JOB COMPLETADO"
          echo "========================================"
          echo ""
          echo "✅ Job:     MEDALLION_PIPELINE_ADVENTUREWORKS"
          echo "✅ Job ID:  ${{ env.JOB_ID }}"
          echo "✅ Cluster: 0714-031111-tj25eups"
          echo ""
          echo "📊 Pipeline de ejecución:"
          echo "   1. Creación Usuarios"
          echo "   ↓"
          echo "   2. Preparación Ambiente"
          echo "   ↓"
          echo "   3. CustomerBronze    ┐"
          echo "   4. ProductBronze     ├─ (paralelo)"
          echo "   5. SalesOrderDetail  │"
          echo "   6. SalesOrderHeader  ┘"
          echo "   ↓"
          echo "   7. Silver"
          echo "   ↓"
          echo "   8. Golden ✅"
          echo ""
          echo "🔗 Revisa tu Job en:"
          echo "   Databricks → Workflows → MEDALLION_PIPELINE_ADVENTUREWORKS"
          echo "========================================"